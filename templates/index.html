<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPBanTool · 封禁工具</title>
<style>
  /* ─── 全局 ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #f0f6fc;
    min-height: 100vh;
    line-height: 1.6;
  }
  a { color: #58a6ff; text-decoration: none; }

  /* ─── Topbar ────────────────────────────── */
  .topbar {
    position: fixed; top: 0; width: 100%; height: 56px; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    background: rgba(15,17,23,0.72);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    user-select: none;
  }
  .topbar-logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1rem; letter-spacing: .3px; }
  .topbar-logo span { background: linear-gradient(135deg,#58a6ff,#3fb950); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .topbar-time { font-size: .82rem; color: #8b949e; font-variant-numeric: tabular-nums; }

  /* ─── Main ──────────────────────────────── */
  .main { max-width: 800px; margin: 80px auto 40px; padding: 0 20px; }

  /* ─── 卡片 ──────────────────────────────── */
  .card {
    background: rgba(22,27,34,0.88);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 24px 28px;
    backdrop-filter: blur(12px);
    margin-bottom: 20px;
  }
  .card-title {
    font-size: .85rem; font-weight: 600; color: #8b949e; text-transform: uppercase;
    letter-spacing: .6px; margin-bottom: 16px;
  }

  /* ─── 输入 ──────────────────────────────── */
  textarea#ip-input {
    width: 100%; min-height: 88px; padding: 12px 14px;
    background: #161b22; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: #f0f6fc; font-size: .92rem;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    resize: vertical; outline: none; transition: border .2s;
  }
  textarea#ip-input:focus { border-color: #58a6ff; }
  textarea#ip-input::placeholder { color: #484f58; }
  .input-hint { font-size: .78rem; color: #8b949e; margin-top: 6px; }

  /* ─── Provider 复选框 ────────────────────── */
  .provider-group { display: flex; gap: 20px; flex-wrap: wrap; margin: 16px 0; }
  .provider-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .provider-check input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: #3fb950; cursor: pointer;
  }
  .provider-check .label { font-size: .9rem; }
  .provider-check .badge { font-size: .72rem; padding: 2px 8px; border-radius: 4px; background: rgba(88,166,255,0.12); color: #58a6ff; }

  /* ─── 按钮 ──────────────────────────────── */
  .btn-row { display: flex; gap: 12px; margin-top: 16px; }
  .btn {
    padding: 10px 24px; border: none; border-radius: 8px;
    font-size: .9rem; font-weight: 600; cursor: pointer;
    transition: opacity .2s, transform .1s; display: flex; align-items: center; gap: 6px;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .btn-primary {
    background: linear-gradient(135deg,#58a6ff,#3fb950);
    color: #fff;
  }
  .btn-primary:hover:not(:disabled) { opacity: .88; }

  /* ─── 结果 ──────────────────────────────── */
  #result-area { display: none; }
  #result-area.visible { display: block; }
  .result-ip { margin-bottom: 14px; }
  .result-ip-header { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: .88rem; color: #f0f6fc; font-weight: 500; margin-bottom: 4px; }
  .result-provider { display: flex; align-items: center; gap: 8px; padding: 4px 0 4px 16px; font-size: .84rem; }
  .result-provider .icon { font-size: 1rem; width: 20px; text-align: center; }
  .result-provider .msg { color: #8b949e; }
  .result-provider.ok .icon { color: #3fb950; }
  .result-provider.fail .icon { color: #e74c3c; }
  .result-provider.whitelisted .icon { color: #e3b341; }
  .result-provider.loading .icon { color: #58a6ff; }

  /* ─── 汇总 ──────────────────────────────── */
  .summary { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: .9rem; font-weight: 500; }
  .summary.ok { background: rgba(63,185,80,0.1); color: #3fb950; }
  .summary.fail { background: rgba(231,76,60,0.1); color: #e74c3c; }
  .summary.warn { background: rgba(227,179,65,0.1); border: 1px solid rgba(227,179,65,0.25); color: #e3b341; }

  /* ─── Loading 动画 ──────────────────────── */
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .loading-pulse { animation: pulse 1.2s ease-in-out infinite; color: #8b949e; font-size: .88rem; }

  /* ─── 错误 / 未配置 ──────────────────────── */
  .warn-box {
    background: rgba(231,76,60,0.08); border: 1px solid rgba(231,76,60,0.25);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
    font-size: .88rem; color: #e74c3c;
  }
  .warn-box.ok { background: rgba(63,185,80,0.08); border-color: rgba(63,185,80,0.25); color: #3fb950; }
  .warn-box.info { background: rgba(88,166,255,0.08); border-color: rgba(88,166,255,0.25); color: #58a6ff; }
  .warn-box code { background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 4px; font-family: 'SF Mono','Fira Code',monospace; font-size: .82rem; }

  /* ─── Loading 骨架 ──────────────────────── */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(88,166,255,0.25); border-top-color: #58a6ff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-logo">🔒 <span>IPBanTool</span> · 封禁工具</div>
  <div class="topbar-time" id="clock"></div>
</header>

<!-- Main -->
<main class="main">

  <!-- 状态提示 -->
  <div id="status-bar"></div>

  <!-- 封禁卡片 -->
  <div class="card">
    <div class="card-title">📥 输入 IP 地址</div>

    <textarea id="ip-input" placeholder="输入 IP，每行一个或用逗号分隔&#10;例如: 1.2.3.4&#10;      5.6.7.8, 9.9.9.9"></textarea>
    <div class="input-hint">支持单 IP、CIDR（如 1.2.3.0/24），空行和多余空格自动处理</div>

    <div class="card-title" style="margin-top:16px">🎯 封禁到以下平台</div>
    <div class="provider-group" id="provider-group">
      <span class="loading-pulse">加载中...</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-ban" disabled>🚫 执行封禁</button>
    </div>
  </div>

  <!-- 结果卡片 -->
  <div class="card" id="result-area">
    <div class="card-title">📋 执行结果</div>
    <div id="result-body"></div>
    <div id="summary-area"></div>
  </div>

</main>

<script>
// ─── 时钟 ──────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const s = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = s;
}
setInterval(updateClock, 1000);
updateClock();

// ─── 状态栏 ────────────────────────────────────────────
const statusBar = document.getElementById('status-bar');

function showStatus(type, msg) {
  statusBar.innerHTML = `<div class="warn-box ${type}">${msg}</div>`;
}

function clearStatus() { statusBar.innerHTML = ''; }

// ─── 工具 ──────────────────────────────────────────────
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── 初始化: 加载 provider 列表 ─────────────────────────
const providerGroup = document.getElementById('provider-group');
const banBtn = document.getElementById('btn-ban');
let providersConfig = [];  // { key, name, configured }
let selectedProviders = new Set();

async function loadProviders() {
  try {
    const resp = await fetch('/api/status');
    const data = await resp.json();

    if (data.status === 'no_provider') {
      showStatus('fail', '⚠️ ' + escHtml(data.message || '未配置云平台凭据。请在程序同级目录创建 <code>.env</code> 文件，配置阿里云或腾讯云的 API 凭据，然后重启服务。'));
      const noCfg = data.providers || [];
      providerGroup.innerHTML = noCfg.map(p =>
        `<label class="provider-check"><input type="checkbox" disabled><span class="label">${escHtml(p.name)}</span> <span class="badge">未配置</span></label>`
      ).join('');
      banBtn.disabled = true;
      return;
    }

    clearStatus();
    providersConfig = data.providers || [];

    providerGroup.innerHTML = providersConfig.map(p => {
      if (!p.configured) {
        return `<label class="provider-check"><input type="checkbox" disabled><span class="label">${escHtml(p.name)}</span> <span class="badge">未配置</span></label>`;
      }
      return `<label class="provider-check"><input type="checkbox" class="provider-cb" value="${escHtml(p.key)}" checked><span class="label">${escHtml(p.name)}</span> <span class="badge">已配置</span></label>`;
    }).join('');

    // 事件绑定
    document.querySelectorAll('.provider-cb').forEach(cb => {
      cb.addEventListener('change', updateSelectedProviders);
    });
    updateSelectedProviders();

    const hasAny = providersConfig.some(p => p.configured);
    banBtn.disabled = !hasAny;

  } catch (e) {
    showStatus('fail', '❌ 无法连接后端服务: ' + escHtml(e.message));
    banBtn.disabled = true;
  }
}

function updateSelectedProviders() {
  selectedProviders.clear();
  document.querySelectorAll('.provider-cb:checked').forEach(cb => {
    selectedProviders.add(cb.value);
  });
  banBtn.disabled = selectedProviders.size === 0;
}

// ─── 执行封禁 ──────────────────────────────────────────
const resultArea = document.getElementById('result-area');
const resultBody = document.getElementById('result-body');
const summaryArea = document.getElementById('summary-area');

banBtn.addEventListener('click', async () => {
  // 收集 IP
  const raw = document.getElementById('ip-input').value;
  if (!raw.trim()) {
    showStatus('info', '📝 请先输入需要封禁的 IP 地址');
    return;
  }

  const ips = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  if (ips.length === 0) {
    showStatus('info', '📝 请先输入需要封禁的 IP 地址');
    return;
  }

  const providers = Array.from(selectedProviders);
  if (providers.length === 0) {
    showStatus('info', '📝 请至少勾选一个封禁平台');
    return;
  }

  // 显示 loading 状态
  clearStatus();
  resultArea.classList.add('visible');
  resultBody.innerHTML = ips.map(ip => {
    const providerLines = providers.map(pk => {
      const p = providersConfig.find(x => x.key === pk);
      return `<div class="result-provider loading"><span class="icon"><span class="spinner"></span></span> ${escHtml(p ? p.name : pk)} <span class="msg">处理中...</span></div>`;
    }).join('');
    return `<div class="result-ip"><div class="result-ip-header">🔍 ${escHtml(ip)}</div>${providerLines}</div>`;
  }).join('');
  summaryArea.innerHTML = '';

  banBtn.disabled = true;
  banBtn.textContent = '⏳ 处理中...';

  try {
    const resp = await fetch('/api/ban', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ips, providers }),
    });

    const data = await resp.json();

    if (!resp.ok) {
      resultBody.innerHTML = `<div class="warn-box fail">❌ ${escHtml(data.detail || '请求失败')}</div>`;
      summaryArea.innerHTML = '';
      return;
    }

    // 渲染结果
    renderResults(data.results, data.summary);

  } catch (e) {
    resultBody.innerHTML = `<div class="warn-box fail">❌ 网络错误: ${escHtml(e.message)}</div>`;
    summaryArea.innerHTML = '';
  } finally {
    banBtn.disabled = false;
    banBtn.textContent = '🚫 执行封禁';
  }
});

function renderResults(results, summary) {
  let html = '';

  for (const [ip, providerResults] of Object.entries(results)) {
    let providerHtml = '';
    for (const [pk, status] of Object.entries(providerResults)) {
      const p = providersConfig.find(x => x.key === pk);
      const name = p ? p.name : pk;
      if (status === 'ok') {
        providerHtml += `<div class="result-provider ok"><span class="icon">✅</span> ${escHtml(name)} <span class="msg">已封禁</span></div>`;
      } else if (status === 'whitelisted') {
        providerHtml += `<div class="result-provider whitelisted"><span class="icon">🟡</span> ${escHtml(name)} <span class="msg">已跳过（命中白名单）</span></div>`;
      } else {
        providerHtml += `<div class="result-provider fail"><span class="icon">❌</span> ${escHtml(name)} <span class="msg">${escHtml(status)}</span></div>`;
      }
    }
    html += `<div class="result-ip"><div class="result-ip-header">🔍 ${escHtml(ip)}</div>${providerHtml}</div>`;
  }

  resultBody.innerHTML = html;

  // 汇总统计
  const { ok, fail, whitelisted = 0 } = summary;
  if (whitelisted > 0) {
    let msg = `✅ ${ok} 个成功，🟡 ${whitelisted} 个跳过（命中白名单）`;
    if (fail > 0) msg += `，❌ ${fail} 个失败`;
    summaryArea.innerHTML = `<div class="summary warn">${msg}</div>`;
  } else if (fail > 0) {
    summaryArea.innerHTML = `<div class="summary fail">✅ ${ok} 个成功，❌ ${fail} 个失败</div>`;
  } else {
    summaryArea.innerHTML = `<div class="summary ok">✅ 全部成功，共 ${ok} 条封禁</div>`;
  }
}

// ─── 启动 ──────────────────────────────────────────────
loadProviders();
</script>
</body>
</html>
